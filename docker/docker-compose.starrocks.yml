services:
  starrocks:
    image: starrocks/allin1-ubuntu:latest
    container_name: realtime-bi-starrocks
    ports:
      - "9030:9030"
      - "8030:8030"
      - "8040:8040"
    volumes:
      - ../sql/starrocks:/opt/starrocks/usrlib/sql
      - paimon-warehouse:/warehouse/paimon:ro

volumes:
  paimon-warehouse:
    external: true
    name: docker_paimon-warehouse
