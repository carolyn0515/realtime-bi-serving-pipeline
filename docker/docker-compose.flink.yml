services:
  flink-jobmanager:
    build:
      context: ..
      dockerfile: docker/flink/Dockerfile
    image: realtime-bi-flink:1.19.3
    container_name: realtime-bi-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
        parallelism.default: 1
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - ../sql/flink:/opt/flink/usrlib/sql

  flink-taskmanager:
    image: realtime-bi-flink:1.19.3
    container_name: realtime-bi-flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - ../sql/flink:/opt/flink/usrlib/sql

  flink-sql-client:
    image: realtime-bi-flink:1.19.3
    container_name: realtime-bi-flink-sql-client
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    command: /opt/flink/bin/sql-client.sh
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    volumes:
      - ../sql/flink:/opt/flink/usrlib/sql
